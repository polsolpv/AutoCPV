name: Build AutoCPV Windows

on:
  push:
    branches: [ master, main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Build executable
        run: python -m PyInstaller --clean --noconfirm AutoCPV.spec

      - name: Install Inno Setup
        run: choco install innosetup --yes --no-progress

      - name: Build installer
        run: '& "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe" installer.iss'
        shell: pwsh

      - name: Upload executable
        uses: actions/upload-artifact@v4
        with:
          name: AutoCPV-exe
          path: dist/AutoCPV.exe

      - name: Upload installer
        uses: actions/upload-artifact@v4
        with:
          name: AutoCPV-installer
          path: installer-dist/AutoCPV-Setup.exe
